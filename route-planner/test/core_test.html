<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>core tests loading…</title>
</head>
<body>
<h1>orca.planner.core headless tests</h1>
<p>Open the browser console; the page title reflects PASS/FAIL.</p>

<!-- React (required by Scittle's Reagent plugin; harmless here) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/scittle@0.6.15/dist/scittle.js" type="application/javascript"></script>
<script src="https://cdn.jsdelivr.net/npm/scittle@0.6.15/dist/scittle.reagent.js" type="application/javascript"></script>

<script type="application/x-scittle" src="../src/planner_core.cljs"></script>

<script type="application/x-scittle">
(ns orca.planner.core-test
  (:require [orca.planner.core :as c]))

;; ── Tiny assertion framework ────────────────────────────────────────────────

(def failures (atom []))

(defn log-result [pass? label & nums]
  (let [tag (if pass? "[PASS]" "[FAIL]")]
    (js/console.log (apply str tag " " label " | " (interpose " " nums)))
    (when-not pass?
      (js/console.error (str "FAIL: " label " | " (apply str (interpose " " nums))))
      (swap! failures conj label))))

(defn finish []
  (if (empty? @failures)
    (do (set! (.-title js/document) "CORE TESTS PASS")
        (js/console.log "ALL CORE TESTS PASS"))
    (do (set! (.-title js/document)
              (str "CORE TESTS FAIL: " (first @failures)))
        (js/console.error (str "CORE TESTS FAIL: " (first @failures))))))

;; ── Run all tests once the JSON is fetched ──────────────────────────────────
;;
;; These exercise the presence-effort-seasonal core (see POSTERIOR_SCHEMA.md).
;; The old "base-logit parity vs blog calculator" assert is gone: the rebuilt
;; model has no single additive logit to compare against.

(defn run-tests [data]
  (try
    (let [cfg   (c/derive-config data)
          ;; fixed example params
          boat    {:speed 2 :length 1
                   :sailing "Motoring" :antifoul "Black"
                   :hull "White/light" :rudder "Spade"}
          base 0.025 ref-nm 100.0 doy 232
          ;; passage carries conditions + the per-point depth/distance grid cell
          passage (fn [dep dist]
                    {:wind 1 :sea 0 :daylight "Average"
                     :depth-ord dep :distance-ord dist})
          pass2 (passage 2 2)
          ;; a point for the Poisson identity
          lat 36.0 lon -8.0]

      ;; 1. POISSON ROUND-TRIP IDENTITY: a single ref_nm segment ⇒
      ;;    p = 1 - exp(-h0·ref_nm·RR·attr_mult) per draw. We reconstruct that
      ;;    per draw from the core primitives and check it matches segment-risk's
      ;;    median (nm = ref_nm) to < 1e-9.
      (let [plan (c/point-plan cfg lat lon doy boat pass2 base ref-nm)
            ps   (mapv (fn [[sdraw beta]]
                         (let [lam (* (c/plan-hazard-draw cfg plan sdraw beta)
                                      ref-nm)]
                           (- 1.0 (js/Math.exp (- lam)))))
                       (c/draw-pairs cfg))
            sr   (c/segment-risk cfg lat lon doy boat pass2 ref-nm base ref-nm)
            med  (c/percentile (vec (sort ps)) 0.50)
            diff (js/Math.abs (- (:median sr) med))]
        (log-result (< diff 1e-9) "poisson round-trip identity"
                    "median-diff=" diff))

      ;; 2. CI ORDERING for segment-risk and route-risk (lo < med < hi).
      (let [sr (c/segment-risk cfg 37.0 -9.0 doy boat (passage 1 3) 75.0 base
                               ref-nm)
            segs [{:lat 37.0 :lon -9.0 :depth-ord 1 :distance-ord 3 :nm 75.0}
                  {:lat 36.2 :lon -6.1 :depth-ord 2 :distance-ord 1 :nm 120.0}]
            rr (c/route-risk cfg boat (passage 1 3) segs doy base ref-nm)]
        (log-result (and (< (:lo89 sr) (:median sr)) (< (:median sr) (:hi89 sr)))
                    "segment-risk CI ordering"
                    "lo=" (:lo89 sr) "med=" (:median sr) "hi=" (:hi89 sr))
        (log-result (and (< (:lo89 rr) (:median rr)) (< (:median rr) (:hi89 rr)))
                    "route-risk CI ordering"
                    "lo=" (:lo89 rr) "med=" (:median rr) "hi=" (:hi89 rr)))

      ;; 3. MONOTONE exposure: segment median increases with nm; route median
      ;;    increases when appending a segment.
      (let [pt 37.0 pn -9.0
            med (fn [nm] (:median (c/segment-risk cfg pt pn doy boat (passage 1 2)
                                                  nm base ref-nm)))
            m25 (med 25.0) m50 (med 50.0) m100 (med 100.0) m200 (med 200.0)
            seg1 [{:lat pt :lon pn :depth-ord 1 :distance-ord 2 :nm 80.0}]
            seg2 (conj seg1 {:lat 36.2 :lon -6.1 :depth-ord 2 :distance-ord 1
                             :nm 90.0})
            r1 (:median (c/route-risk cfg boat (passage 1 2) seg1 doy base ref-nm))
            r2 (:median (c/route-risk cfg boat (passage 1 2) seg2 doy base ref-nm))]
        (log-result (and (< m25 m50) (< m50 m100) (< m100 m200))
                    "segment monotone in nm"
                    "25=" m25 "50=" m50 "100=" m100 "200=" m200)
        (log-result (< r1 r2) "route monotone on append"
                    "1seg=" r1 "2seg=" r2))

      ;; 4. SPATIAL effect: a hotspot strictly higher than the open ocean,
      ;;    identical params/depth/distance (compare RR medians directly).
      (let [rr-med (fn [la lo dy]
                     (let [b (c/spatial-basis cfg la lo dy)
                           rs (mapv #(c/rr-draw cfg % b) (:spatial-draws cfg))]
                       (c/percentile (vec (sort rs)) 0.50)))
            ;; summer Galician hotspot vs deep open Atlantic
            hot (rr-med 44.0 -9.5 232)
            atl (rr-med 38.0 -18.0 232)]
        (log-result (> hot atl) "spatial hotspot > open ocean"
                    "hotspot=" hot "open-ocean=" atl))

      ;; 5. BOUNDED: the RR field has a finite maximum over the grid (it does NOT
      ;;    run away). Sample RR widely; the max stays modest (well under ~50).
      (let [rr-med (fn [la lo]
                     (let [b (c/spatial-basis cfg la lo doy)
                           rs (mapv #(c/rr-draw cfg % b) (:spatial-draws cfg))]
                       (c/percentile (vec (sort rs)) 0.50)))
            samples (for [la (range 28 49 2) lo (range -19 1 2)]
                      (rr-med la lo))
            mx (reduce max 0.0 samples)]
        (log-result (< mx 50.0) "spatial field bounded (finite max)"
                    "max-RR=" mx))

      ;; 6. SEASONAL: a Gibraltar point's RR is higher in winter (doy 50) than
      ;;    summer (doy 232); a Galician point is the reverse (the hotspot moves
      ;;    north as the pod follows the tuna).
      (let [rr-med (fn [la lo dy]
                     (let [b (c/spatial-basis cfg la lo dy)
                           rs (mapv #(c/rr-draw cfg % b) (:spatial-draws cfg))]
                       (c/percentile (vec (sort rs)) 0.50)))
            gib-w (rr-med 36.0 -5.5 50)
            gib-s (rr-med 36.0 -5.5 232)
            gal-w (rr-med 44.0 -9.5 50)
            gal-s (rr-med 44.0 -9.5 232)]
        (log-result (> gib-w gib-s) "seasonal: Gibraltar winter > summer"
                    "winter=" gib-w "summer=" gib-s)
        (log-result (> gal-s gal-w) "seasonal: Galicia summer > winter"
                    "summer=" gal-s "winter=" gal-w)))

    (catch :default e
      (js/console.error (str "EXCEPTION during tests: " e))
      (swap! failures conj (str "exception: " e))))
  (finish))

(-> (js/fetch "../posterior_planner.json")
    (.then #(.json %))
    (.then #(run-tests (js->clj % :keywordize-keys true)))
    (.catch (fn [e]
              (js/console.error (str "FETCH FAILED: " e))
              (set! (.-title js/document) (str "CORE TESTS FAIL: fetch " e)))))
</script>
</body>
</html>
